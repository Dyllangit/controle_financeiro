<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Meu Controle Financeiro</title>
    <style>
        /* ── Reset ── */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:sans-serif;color:#333;background:#f4f7f6;padding:12px}

        /* ── Auth ── */
        #auth-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 24px)}
        .auth-box{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:2rem;width:100%;max-width:400px}
        .auth-logo{text-align:center;margin-bottom:1.5rem}
        .auth-logo h1{font-size:22px;font-weight:600;color:#222}
        .auth-logo p{font-size:13px;color:#888;margin-top:4px}
        .auth-tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:1.5rem}
        .auth-tab{flex:1;text-align:center;padding:10px;font-size:14px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
        .auth-tab.active{color:#222;border-bottom:2px solid #222;font-weight:500}
        .auth-form{display:none}.auth-form.active{display:block}
        .auth-field{margin-bottom:1rem}
        .auth-field label{display:block;font-size:12px;color:#666;margin-bottom:4px}
        .auth-field input{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:6px;font-size:16px;transition:border .15s}
        .auth-field input:focus{outline:none;border-color:#555}
        .auth-btn{width:100%;padding:12px;background:#222;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem;transition:background .15s}
        .auth-btn:hover{background:#444}
        .auth-error{color:#dc3545;font-size:13px;margin-top:8px;text-align:center;min-height:18px}

        /* ── App ── */
        #app-screen{display:none}
        .app{max-width:960px;margin:0 auto;padding:.85rem;background:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1)}

        /* Topbar */
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;padding-bottom:.65rem;border-bottom:1px solid #eee}
        .topbar-user{font-size:13px;color:#666}
        .topbar-user strong{color:#333}
        .topbar-logout{font-size:12px;color:#dc3545;cursor:pointer;background:none;border:1px solid #dc3545;padding:6px 12px;border-radius:4px;white-space:nowrap}
        .topbar-logout:hover{background:#fff5f5}

        /* Tabs - scroll horizontal no celular */
        .tabs{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1px solid #ddd;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:10px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;white-space:nowrap;flex-shrink:0}
        .tab.active{color:#000;border-bottom:2px solid #000;font-weight:500}

        .page{display:none}.page.active{display:block}

        /* Cards do painel */
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
        .card{background:#f9f9f9;border-radius:8px;padding:.85rem;border:1px solid #eee}
        .card-label{font-size:11px;color:#666;margin-bottom:4px}
        .card-value{font-size:20px;font-weight:500}
        .green{color:#28a745}.red{color:#dc3545}.blue{color:#007bff}

        /* Sections */
        .section{border:1px solid #eee;border-radius:8px;padding:1rem;margin-bottom:1rem}
        .section-title{font-size:15px;font-weight:500;margin-bottom:1rem;border-bottom:1px solid #eee;padding-bottom:5px;display:flex;justify-content:space-between;align-items:center}

        /* Formulários - 1 coluna no mobile, grid no desktop */
        .form-row{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
        label{font-size:12px;color:#666;display:block;margin-bottom:4px}
        input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:16px}
        input:focus,select:focus{outline:none;border-color:#555}

        /* Botões - touch-friendly */
        .btn{padding:10px 18px;border:1px solid #ddd;border-radius:6px;font-size:14px;cursor:pointer;background:#fff;min-height:40px}
        .btn.primary{background:#333;color:#fff;border-color:transparent}
        .btn.primary:hover{background:#555}
        .btn.danger{color:#dc3545;border-color:#dc3545;padding:8px 12px;font-size:13px}
        .btn.sm{padding:8px 12px;font-size:13px;min-height:36px}
        .btn-full{width:100%;margin-top:4px}

        /* Tabelas - scroll horizontal no mobile */
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
        table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px}
        th,td{text-align:left;padding:9px 8px;border-bottom:1px solid #eee}
        th{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

        /* Cards de gastos para mobile (alternativa à tabela) */
        .gasto-card{border:1px solid #eee;border-radius:8px;padding:.85rem;margin-bottom:.6rem;background:#fafafa}
        .gasto-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
        .gasto-card-desc{font-weight:500;font-size:14px;flex:1;margin-right:8px}
        .gasto-card-valor{font-weight:600;font-size:15px;white-space:nowrap}
        .gasto-card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
        .gasto-card-info{font-size:11px;color:#888}
        .gasto-card-actions{margin-top:8px;display:flex;justify-content:flex-end}

        .badge{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
        .debito{background:#ffebee;color:#c62828}
        .credito{background:#e3f2fd;color:#1565c0}

        .progress-bar{height:8px;background:#eee;border-radius:99px;overflow:hidden;margin:4px 0}
        .progress-fill{height:100%;background:#007bff;border-radius:99px;transition:width .4s}

        /* Grid de bancos */
        .banco-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1rem}
        .banco-card{border:1px solid #eee;border-radius:8px;padding:1rem;background:#fafafa}
        .banco-card-nome{font-weight:600;font-size:14px;margin-bottom:8px;color:#333}
        .banco-card-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
        .banco-card-label{color:#888}

        /* Chips de categoria */
        .chip{display:inline-flex;align-items:center;gap:6px;background:#f0f0f0;border-radius:99px;padding:6px 12px;font-size:13px;margin:4px}
        .chip button{border:none;background:none;cursor:pointer;color:#999;font-size:18px;line-height:1;padding:0}
        .chip button:hover{color:#dc3545}

        .empty{color:#aaa;font-size:13px;text-align:center;padding:24px}
        .divider{height:1px;background:#eee;margin:14px 0}
        .mt{margin-top:10px}
        .tag-alimentacao{background:#fff3e0;color:#e65100}
        .tag-transporte{background:#e8f5e9;color:#2e7d32}
        .tag-saude{background:#fce4ec;color:#c62828}
        .tag-lazer{background:#ede7f6;color:#4527a0}
        .tag-pessoal{background:#e3f2fd;color:#1565c0}
        .tag-outro{background:#f5f5f5;color:#555}

        /* ── Media queries ── */
        @media(min-width:600px){
            body{padding:20px}
            .form-row{grid-template-columns:1fr 1fr}
            .form-row.three{grid-template-columns:1fr 1fr 1fr}
            .form-row.four{grid-template-columns:1fr 1fr 1fr 1fr}
            .banco-grid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
            .btn-full{width:auto}
        }
        @media(min-width:768px){
            .cards{grid-template-columns:repeat(3,1fr)}
        }

        /* ── Loading Overlay ── */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(4px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #loading-overlay.ativo { display: flex; }
        .spinner {
            width: 46px; height: 46px;
            border: 5px solid #ddd;
            border-top-color: #333;
            border-radius: 50%;
            animation: giro 0.7s linear infinite;
        }
        @keyframes giro { to { transform: rotate(360deg); } }
        .loading-msg {
            font-size: 15px;
            color: #444;
            font-weight: 500;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 13px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            z-index: 10000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
            max-width: calc(100vw - 32px);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, bottom 0.3s ease;
        }
        #toast.visivel {
            opacity: 1;
            bottom: 28px;
        }
        #toast.ok  { background: #1a7f4b; }
        #toast.err { background: #c0392b; }
    </style>
</head>
<body>

<!-- ── Loading Overlay ── -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-msg" id="loading-msg">Aguarde...</div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>


<!-- ══════════════ TELA DE AUTH ══════════════ -->
<div id="auth-screen">
    <div class="auth-box">
        <div class="auth-logo">
            <h1>💰 Controle Financeiro</h1>
            <p>Gerencie suas finanças com facilidade</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
            <button class="auth-tab" onclick="switchAuthTab('registrar')">Criar conta</button>
        </div>

        <!-- Login -->
        <div id="form-login" class="auth-form active">
            <div class="auth-field">
                <label>E-mail</label>
                <input id="l-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter') fazerLogin()">
            </div>
            <div class="auth-field">
                <label>Senha</label>
                <input id="l-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
            </div>
            <button class="auth-btn" onclick="fazerLogin()">Entrar</button>
            <div class="auth-error" id="login-erro"></div>
        </div>

        <!-- Registro -->
        <div id="form-registrar" class="auth-form">
            <div class="auth-field">
                <label>Nome</label>
                <input id="r-nome" type="text" placeholder="Seu nome" onkeydown="if(event.key==='Enter') fazerRegistro()">
            </div>
            <div class="auth-field">
                <label>E-mail</label>
                <input id="r-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter') fazerRegistro()">
            </div>
            <div class="auth-field">
                <label>Senha</label>
                <input id="r-senha" type="password" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter') fazerRegistro()">
            </div>
            <button class="auth-btn" onclick="fazerRegistro()">Criar conta</button>
            <div class="auth-error" id="registro-erro"></div>
        </div>
    </div>
</div>

<!-- ══════════════ TELA DO APP ══════════════ -->
<div id="app-screen">
<div class="app">
    <div class="topbar">
        <div class="topbar-user">Olá, <strong id="topbar-nome">...</strong></div>
        <button class="topbar-logout" onclick="logout()">Sair</button>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="goTab('painel')">Painel</button>
        <button class="tab" onclick="goTab('gastos')">Gastos</button>
        <button class="tab" onclick="goTab('metas')">Metas</button>
        <button class="tab" onclick="goTab('bancos')">Bancos</button>
        <button class="tab" onclick="goTab('categorias')">Categorias</button>
    </div>

    <div id="painel" class="page active">Carregando...</div>
    <div id="gastos" class="page">Carregando...</div>
    <div id="metas" class="page">Carregando...</div>
    <div id="bancos" class="page">Carregando...</div>
    <div id="categorias" class="page">Carregando...</div>
    <div id="config" class="page" style="display:none"></div>
</div>
</div>

<script>
const API_URL = "https://controlefinanceiro-production-e3b0.up.railway.app";

// ─── Loading & Toast ──────────────────────────────────────────────────────────

function mostrarLoading(msg) {
    document.getElementById('loading-msg').textContent = msg || 'Aguarde...';
    document.getElementById('loading-overlay').classList.add('ativo');
}

function esconderLoading() {
    document.getElementById('loading-overlay').classList.remove('ativo');
}

let _toastTimer = null;
function mostrarToast(msg, tipo) {
    // tipo: 'ok' ou 'err'
    const el = document.getElementById('toast');
    // Remove classes anteriores e reinicia
    el.className = '';
    el.textContent = msg;
    // Força o browser a processar a remoção antes de adicionar novamente
    requestAnimationFrame(() => {
        el.classList.add(tipo || 'ok');
        el.classList.add('visivel');
    });
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => {
        el.classList.remove('visivel');
    }, 3000);
}



let TOKEN = localStorage.getItem("cf_token") || null;
let USUARIO_NOME = localStorage.getItem("cf_nome") || "";

let listaBancosOficiais = [];

let state = {
    gastos: [],
    metas: [],
    bancos: [],
    categorias: [],
    config: { saldo: 0, limite_credito: 0 }
};

// ─── Auth helpers ─────────────────────────────────────────────────────────────

function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` };
}

function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((b, i) => b.classList.toggle('active', ['login','registrar'][i] === tab));
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-registrar').classList.toggle('active', tab === 'registrar');
    document.getElementById('login-erro').textContent = '';
    document.getElementById('registro-erro').textContent = '';
}

async function fazerLogin() {
    const email = document.getElementById('l-email').value.trim();
    const senha = document.getElementById('l-senha').value;
    const erroEl = document.getElementById('login-erro');
    erroEl.textContent = '';
    if (!email || !senha) return erroEl.textContent = 'Preencha e-mail e senha.';
    try {
        const res = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) return erroEl.textContent = data.detail || 'Erro ao entrar.';
        salvarSessao(data);
    } catch(e) {
        erroEl.textContent = 'Erro de conexão com o servidor.';
    }
}

async function fazerRegistro() {
    const nome  = document.getElementById('r-nome').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const senha = document.getElementById('r-senha').value;
    const erroEl = document.getElementById('registro-erro');
    erroEl.textContent = '';
    if (!nome || !email || !senha) return erroEl.textContent = 'Preencha todos os campos.';
    if (senha.length < 6) return erroEl.textContent = 'Senha deve ter ao menos 6 caracteres.';
    try {
        const res = await fetch(`${API_URL}/registrar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, email, senha })
        });
        const data = await res.json();
        if (!res.ok) return erroEl.textContent = data.detail || 'Erro ao criar conta.';
        salvarSessao(data);
    } catch(e) {
        erroEl.textContent = 'Erro de conexão com o servidor.';
    }
}

function salvarSessao(data) {
    TOKEN = data.token;
    USUARIO_NOME = data.nome;
    localStorage.setItem("cf_token", TOKEN);
    localStorage.setItem("cf_nome", USUARIO_NOME);
    entrarNoApp();
}

function entrarNoApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('topbar-nome').textContent = USUARIO_NOME;
    fetchData();
}

function logout() {
    TOKEN = null;
    USUARIO_NOME = "";
    localStorage.removeItem("cf_token");
    localStorage.removeItem("cf_nome");
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('l-email').value = '';
    document.getElementById('l-senha').value = '';
}

// Verificar se já tem sessão salva
if (TOKEN) {
    entrarNoApp();
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function fetchData() {
    mostrarLoading('Carregando dados...');
    try {
        const [resGastos, resMetas, resBancos, resCats, resConfig, resBancosLista] = await Promise.all([
            fetch(`${API_URL}/gastos`,       { headers: authHeaders() }),
            fetch(`${API_URL}/metas`,        { headers: authHeaders() }),
            fetch(`${API_URL}/bancos`,       { headers: authHeaders() }),
            fetch(`${API_URL}/categorias`,   { headers: authHeaders() }),
            fetch(`${API_URL}/config`,       { headers: authHeaders() }),
            fetch(`${API_URL}/bancos-lista`, { headers: authHeaders() })
        ]);

        if (resGastos.status === 401) { esconderLoading(); logout(); return; }

        state.gastos        = await resGastos.json();
        state.metas         = await resMetas.json();
        state.bancos        = await resBancos.json();
        state.categorias    = await resCats.json();
        listaBancosOficiais = await resBancosLista.json();
        const config        = await resConfig.json();
        if (config) state.config = config;

        renderAll();
    } catch (e) {
        console.error('Erro ao buscar dados da API:', e);
        mostrarToast('Erro de conexão com o servidor.', 'err');
    } finally {
        esconderLoading();
    }
}

async function addGasto() {
    const bancoId = parseInt(document.getElementById('g-banco').value);
    if (!bancoId) return mostrarToast('Selecione um banco.', 'err');
    const catId = parseInt(document.getElementById('g-cat').value);
    const g = {
        descricao:    document.getElementById('g-desc').value,
        valor:        valorNumerico(document.getElementById('g-val')),
        tipo:         document.getElementById('g-tipo').value,
        id_categoria: catId || null,
        id_banco:     bancoId,
        data:         document.getElementById('g-data').value,
    };
    mostrarLoading('Salvando gasto...');
    try {
        const res = await fetch(`${API_URL}/gastos`, { method:'POST', headers: authHeaders(), body:JSON.stringify(g) });
        if (!res.ok) { const d = await res.json(); mostrarToast(d.detail || 'Erro ao salvar.', 'err'); return; }
        await fetchData();
        mostrarToast('Gasto salvo com sucesso! ✓', 'ok');
    } catch(e) { mostrarToast('Erro de conexão.', 'err'); }
    finally { esconderLoading(); }
}

async function removeGasto(id) {
    if (!confirm('Apagar este gasto?')) return;
    mostrarLoading('Apagando gasto...');
    try {
        await fetch(`${API_URL}/gastos/${id}`, { method:'DELETE', headers: authHeaders() });
        await fetchData();
        mostrarToast('Gasto removido. ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao remover.', 'err'); }
    finally { esconderLoading(); }
}

async function addMeta() {
    const m = { nome: document.getElementById('m-nome').value, alvo: valorNumerico(document.getElementById('m-alvo')) };
    if (!m.nome) return mostrarToast('Informe o nome da meta.', 'err');
    mostrarLoading('Criando meta...');
    try {
        await fetch(`${API_URL}/metas`, { method:'POST', headers: authHeaders(), body:JSON.stringify(m) });
        await fetchData();
        mostrarToast('Meta criada! ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao criar meta.', 'err'); }
    finally { esconderLoading(); }
}

async function depositar(id) {
    const valor = valorNumerico(document.getElementById(`dep-${id}`));
    if (!valor) return mostrarToast('Informe o valor do depósito.', 'err');
    mostrarLoading('Registrando depósito...');
    try {
        await fetch(`${API_URL}/metas/${id}/depositar`, { method:'POST', headers: authHeaders(), body:JSON.stringify({ valor }) });
        await fetchData();
        mostrarToast('Depósito registrado! ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao depositar.', 'err'); }
    finally { esconderLoading(); }
}

async function addBanco() {
    const b = {
        banco_lista_id: parseInt(document.getElementById('b-select').value),
        saldo:          valorNumerico(document.getElementById('b-saldo')),
        limite_credito: valorNumerico(document.getElementById('b-limite'))
    };
    if (!b.banco_lista_id) return mostrarToast('Selecione um banco.', 'err');
    mostrarLoading('Ativando banco...');
    try {
        const res = await fetch(`${API_URL}/bancos`, { method:'POST', headers: authHeaders(), body:JSON.stringify(b) });
        if (!res.ok) { const d = await res.json(); mostrarToast(d.detail || 'Erro ao ativar banco.', 'err'); return; }
        await fetchData();
        mostrarToast('Banco ativado! ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao ativar banco.', 'err'); }
    finally { esconderLoading(); }
}

async function removeBanco(id) {
    if (!confirm('Apagar este banco?')) return;
    mostrarLoading('Removendo banco...');
    try {
        const res = await fetch(`${API_URL}/bancos/${id}`, { method:'DELETE', headers: authHeaders() });
        if (!res.ok) { const d = await res.json(); mostrarToast(d.detail || 'Não foi possível remover.', 'err'); return; }
        await fetchData();
        mostrarToast('Banco removido. ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao remover banco.', 'err'); }
    finally { esconderLoading(); }
}

async function addCategoria() {
    const nome = document.getElementById('cat-nome').value.trim();
    if (!nome) return mostrarToast('Informe o nome da categoria.', 'err');
    mostrarLoading('Adicionando categoria...');
    try {
        await fetch(`${API_URL}/categorias`, { method:'POST', headers: authHeaders(), body:JSON.stringify({ nome }) });
        await fetchData();

}

async function removeCategoria(id) {
    if (!confirm('Apagar esta categoria?')) return;
    mostrarLoading('Removendo categoria...');
    try {
        await fetch(`${API_URL}/categorias/${id}`, { method:'DELETE', headers: authHeaders() });
        await fetchData();
        mostrarToast('Categoria removida. ✓', 'ok');
    } catch(e) { mostrarToast('Erro ao remover.', 'err'); }
    finally { esconderLoading(); }
}

async function salvarConfig() {
    const conf = {
        saldo:          parseFloat(document.getElementById('c-saldo').value),

// ─── UI ───────────────────────────────────────────────────────────────────────

function fmt(v) {
    const sinal = v < 0 ? '-' : '';
    return `${sinal}R$ ${Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
}

function mascaraMoeda(input) {
    let v = input.value.replace(/\D/g, '');
    v = (parseInt(v || '0') / 100).toFixed(2);
    input.value = v.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function valorNumerico(input) {
    return parseFloat(input.value.replace(/\./g, '').replace(',', '.')) || 0;
}

function pct(v, t) { return t > 0 ? Math.min(100, (v / t) * 100).toFixed(1) : 0; }

function goTab(t) {
    const names = ['painel','gastos','metas','bancos','categorias'];
    document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', names[i] === t));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(t).classList.add('active');
}

function renderAll() {
    renderPainel();
    renderGastos();
    renderMetas();
    renderBancos();
    renderCategorias();
    renderConfig();
}

// ─── PAINEL ───────────────────────────────────────────────────────────────────
function renderPainel() {
    const totalDebito  = state.gastos.filter(g => g.tipo === 'debito').reduce((a, b) => a + b.valor, 0);
    const totalCredito = state.gastos.filter(g => g.tipo === 'credito').reduce((a, b) => a + b.valor, 0);
    const totalSaldoCadastrado = state.bancos.reduce((a, b) => a + b.saldo, 0);
    const totalLimite  = state.bancos.reduce((a, b) => a + b.limite_credito, 0);
    const saldoAtual   = totalSaldoCadastrado - totalDebito;

    const porBanco = state.bancos.map(banco => {
        const gastosB  = state.gastos.filter(g => g.banco_id === banco.id);
        const debitoB  = gastosB.filter(g => g.tipo === 'debito').reduce((a, b) => a + b.valor, 0);
        const creditoB = gastosB.filter(g => g.tipo === 'credito').reduce((a, b) => a + b.valor, 0);
        return { ...banco, debitoB, creditoB, saldoAtualB: banco.saldo - debitoB, limiteDispB: banco.limite_credito - creditoB };
    });

    const corSaldo = saldoAtual < 0 ? 'red' : 'green';

    document.getElementById('painel').innerHTML = `
        <div class="cards">
            <div class="card"><div class="card-label">Saldo Total (Todos os Bancos)</div><div class="card-value ${corSaldo}">${fmt(saldoAtual)}</div></div>
            <div class="card"><div class="card-label">Fatura Total (Cartão)</div><div class="card-value red">${fmt(totalCredito)}</div></div>
            <div class="card"><div class="card-label">Limite Disponível Total</div><div class="card-value blue">${fmt(totalLimite - totalCredito)}</div></div>
        </div>

        <div class="section">
            <div class="section-title">Por Banco</div>
            ${porBanco.length === 0 ? `<div class="empty">Nenhum banco cadastrado. Vá em "Bancos" para adicionar.</div>` : `
            <div class="banco-grid">
                ${porBanco.map(b => `
                    <div class="banco-card">
                        <div class="banco-card-nome">🏦 ${b.nome}</div>
                        <div class="banco-card-row"><span class="banco-card-label">Saldo</span><span class="${b.saldoAtualB < 0 ? 'red' : 'green'}">${fmt(b.saldoAtualB)}</span></div>
                        <div class="banco-card-row"><span class="banco-card-label">Fatura</span><span class="red">${fmt(b.creditoB)}</span></div>
                        <div class="banco-card-row"><span class="banco-card-label">Limite disp.</span><span class="blue">${fmt(b.limiteDispB)}</span></div>
                    </div>
                `).join('')}
            </div>`}
        </div>

        <div class="section">
            <div class="section-title">Últimos 5 Gastos</div>
            <div class="table-wrap"><table>
                <thead><tr><th>Data</th><th>Descrição</th><th>Banco</th><th>Tipo</th><th>Valor</th></tr></thead>
                <tbody>
                    ${state.gastos.slice(0, 5).map(g => `
                        <tr>
                            <td>${g.data}</td>
                            <td>${g.descricao}</td>
                            <td>${g.banco_nome || '—'}</td>
                            <td><span class="badge ${g.tipo}">${g.tipo}</span></td>
                            <td>${fmt(g.valor)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table></div>
        </div>`;
}

// ─── GASTOS ───────────────────────────────────────────────────────────────────
function renderGastos() {
    const catOpts = state.categorias.length
        ? state.categorias.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')
        : `<option>Sem categorias</option>`;
    const bancoOpts = state.bancos.length
        ? `<option value="">Selecione o banco</option>` + state.bancos.map(b => `<option value="${b.id}">${b.nome}</option>`).join('')
        : `<option value="">Nenhum banco cadastrado</option>`;

    const listaGastos = state.gastos.length === 0
        ? `<div class="empty">Nenhum gasto lançado ainda.</div>`
        : state.gastos.map(g => `
            <div class="gasto-card">
                <div class="gasto-card-top">
                    <div class="gasto-card-desc">${g.descricao}</div>
                    <div class="gasto-card-valor ${g.tipo === 'debito' ? 'red' : 'blue'}">${fmt(g.valor)}</div>
                </div>
                <div class="gasto-card-meta">
                    <span class="badge ${g.tipo}">${g.tipo === 'debito' ? 'Débito' : 'Crédito'}</span>
                    <span class="gasto-card-info">📅 ${g.data}</span>
                    ${g.banco_nome ? `<span class="gasto-card-info">🏦 ${g.banco_nome}</span>` : ''}

                    <button class="btn danger sm" onclick="removeGasto(${g.id})">Apagar</button>
                </div>
            </div>
        `).join('');

    document.getElementById('gastos').innerHTML = `
        <div class="section">
            <div class="section-title">Novo Gasto</div>
            <div class="form-row three">
                <div><label>Descrição</label><input id="g-desc" placeholder="Ex: Mercado"></div>
                <div><label>Valor (R$)</label><input id="g-val" type="text" placeholder="0,00" oninput="mascaraMoeda(this)" inputmode="numeric"></div>
                <div><label>Data</label><input id="g-data" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
            </div>
            <div class="form-row three">
                <div><label>Tipo</label><select id="g-tipo"><option value="debito">Débito (sai do saldo)</option><option value="credito">Crédito (fatura)</option></select></div>
                <div><label>Banco</label><select id="g-banco">${bancoOpts}</select></div>
                <div><label>Categoria</label><select id="g-cat">${catOpts}</select></div>
            </div>
            <button class="btn primary btn-full" onclick="addGasto()">Salvar Gasto</button>
        </div>
        <div class="section">
            <div class="section-title">Todos os Gastos <small style="font-size:12px;color:#999;font-weight:400">(${state.gastos.length})</small></div>
            ${listaGastos}
        </div>`;
}
